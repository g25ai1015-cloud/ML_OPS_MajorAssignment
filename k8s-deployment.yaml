apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-mlops-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-mlops-app
  template:
    metadata:
      labels:
        app: flask-mlops-app
    spec:
      containers:
      - name: flask-mlops-container
        image: damini123456/mlops-faces-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-mlops-service
spec:
  type: NodePort
  selector:
    app: flask-mlops-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000