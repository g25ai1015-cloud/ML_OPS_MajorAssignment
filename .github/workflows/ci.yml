name: CI Workflow

on: [push]

jobs:
  check_working_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run train.py
        run: python train.py

      - name: Run test.py
        run: python test.py